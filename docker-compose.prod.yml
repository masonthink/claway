# Claway 生产环境
# 复用 DTC 的 PostgreSQL 和 Caddy，只运行后端 + 迁移
#
# 部署：
#   docker compose --env-file .env.prod -f docker-compose.prod.yml run --rm migrate
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --no-deps --force-recreate backend

services:

  # ── DB Migration ────────────────────────────────────────────────────────
  migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/mason2047/claway-backend:latest}
    container_name: claway-migrate
    entrypoint: ["/migrate"]
    command: ["-path", "/migrations", "-database", "${DATABASE_URL}", "up"]
    env_file: .env.prod
    network_mode: host
    restart: "no"

  # ── Go Backend (port 8081) ──────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/mason2047/claway-backend:latest}
    container_name: claway-backend
    env_file: .env.prod
    network_mode: host
    restart: always
