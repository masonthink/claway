name: Rollback

on:
  workflow_dispatch:

jobs:
  rollback:
    name: Rollback to Previous Image
    runs-on: ubuntu-latest

    steps:
      - name: SSH rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 22
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/claway

            # Read previous image
            PREV_IMAGE=$(grep '^PREV_BACKEND_IMAGE=' .env.prod | cut -d= -f2 || true)
            if [ -z "$PREV_IMAGE" ]; then
              echo "ERROR: No previous image found in .env.prod"
              exit 1
            fi

            echo "Rolling back to: ${PREV_IMAGE}"

            # Login to GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mason2047 --password-stdin

            # Update image reference
            CURRENT=$(grep '^BACKEND_IMAGE=' .env.prod | cut -d= -f2)
            sed -i '/^BACKEND_IMAGE=/d' .env.prod
            echo "BACKEND_IMAGE=${PREV_IMAGE}" >> .env.prod

            # Pull and restart
            docker pull ${PREV_IMAGE}
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --no-deps --force-recreate backend

            # Health check
            echo "Waiting for backend to become healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8081/health > /dev/null 2>&1; then
                echo "Rollback successful (attempt $i)"
                exit 0
              fi
              sleep 2
            done
            echo "ERROR: Rollback health check failed"
            exit 1
