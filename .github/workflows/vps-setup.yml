name: VPS Setup

on:
  workflow_dispatch:

jobs:
  setup:
    name: Configure VPS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 1 - Install Docker
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e
            if command -v docker &> /dev/null; then
              echo "Docker already installed: $(docker --version)"
              exit 0
            fi
            apt-get update
            apt-get install -y ca-certificates curl
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
            chmod a+r /etc/apt/keyrings/docker.asc
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian bookworm stable" > /etc/apt/sources.list.d/docker.list
            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
            echo "Docker installed: $(docker --version)"

      - name: 2 - Create deploy user
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          script: |
            set -e
            if id deploy &>/dev/null; then
              echo "deploy user exists"
            else
              useradd -m -s /bin/bash deploy
              echo "deploy ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/deploy
            fi
            mkdir -p /home/deploy/.ssh
            echo "${{ secrets.VPS_DEPLOY_PUBKEY }}" > /home/deploy/.ssh/authorized_keys
            chmod 700 /home/deploy/.ssh
            chmod 600 /home/deploy/.ssh/authorized_keys
            chown -R deploy:deploy /home/deploy/.ssh
            usermod -aG docker deploy
            echo "deploy user ready"

      - name: 3 - Setup directories and PostgreSQL
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          command_timeout: 5m
          script: |
            set -e
            mkdir -p /opt/claway
            chown -R deploy:deploy /opt/claway

            if docker ps -a --format '{{.Names}}' | grep -q claway-postgres; then
              echo "PostgreSQL already exists"
            else
              docker run -d \
                --name claway-postgres \
                --restart always \
                -e POSTGRES_USER=claway \
                -e POSTGRES_PASSWORD=${{ secrets.CLAWAY_DB_PASSWORD }} \
                -e POSTGRES_DB=claway \
                -p 5432:5432 \
                -v claway_pgdata:/var/lib/postgresql/data \
                postgres:16-alpine
              echo "PostgreSQL started"
            fi

      - name: 4 - Setup Caddy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          command_timeout: 5m
          script: |
            set -e
            mkdir -p /opt/caddy

            cat > /opt/caddy/Caddyfile << 'EOF'
            {
              trusted_proxies static 173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22 141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20 197.234.240.0/22 198.41.128.0/17 162.158.0.0/15 104.16.0.0/13 104.24.0.0/14 172.64.0.0/13 131.0.72.0/22
            }

            claway.concors.ai {
              reverse_proxy localhost:8081 {
                health_uri /health
                health_interval 10s
                health_timeout 5s
                header_up X-Real-IP {http.request.header.CF-Connecting-IP}
                header_up X-Forwarded-For {http.request.header.CF-Connecting-IP}
              }
              log {
                output stdout
                format json
              }
              header {
                Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
                X-Content-Type-Options "nosniff"
                X-Frame-Options "DENY"
                Referrer-Policy "strict-origin-when-cross-origin"
                -Server
              }
            }
            EOF

            if docker ps -a --format '{{.Names}}' | grep -q claway-caddy; then
              docker cp /opt/caddy/Caddyfile claway-caddy:/etc/caddy/Caddyfile
              docker exec claway-caddy caddy reload --config /etc/caddy/Caddyfile || docker restart claway-caddy
              echo "Caddy config reloaded"
            else
              docker run -d \
                --name claway-caddy \
                --restart always \
                --network host \
                -v /opt/caddy/Caddyfile:/etc/caddy/Caddyfile:ro \
                -v caddy_data:/data \
                -v caddy_config:/config \
                caddy:2-alpine
              echo "Caddy started"
            fi

      - name: 5 - Create env and compose files
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          script: |
            set -e
            cat > /opt/claway/.env.prod << EOF
            DATABASE_URL=postgresql://claway:${{ secrets.CLAWAY_DB_PASSWORD }}@localhost:5432/claway?sslmode=disable
            JWT_SECRET=${{ secrets.CLAWAY_JWT_SECRET }}
            PORT=8081
            OPENCLAW_BASE_URL=https://api.openclaw.ai
            UPSTREAM_LLM_BASE_URL=https://api.openai.com
            BACKEND_IMAGE=ghcr.io/mason2047/claway-backend:latest
            EOF
            chown deploy:deploy /opt/claway/.env.prod
            echo ".env.prod created"

      - name: 6 - Copy docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          source: "docker-compose.prod.yml"
          target: "/opt/claway/"

      - name: 7 - Verify setup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          script: |
            echo "=== Docker containers ==="
            docker ps
            echo ""
            echo "=== /opt/claway contents ==="
            ls -la /opt/claway/
            echo ""
            echo "=== deploy user test ==="
            su - deploy -c "docker ps" && echo "deploy user can run docker"
            echo ""
            echo "=== SETUP COMPLETE ==="
