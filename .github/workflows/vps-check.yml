name: VPS Health Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Docker containers ==="
            docker ps -a
            echo ""
            echo "=== Backend logs ==="
            docker logs claway-backend --tail 20 2>&1 || echo "No backend container"
            echo ""
            echo "=== Caddy logs ==="
            docker logs claway-caddy --tail 20 2>&1 || echo "No caddy container"
            echo ""
            echo "=== Direct health check ==="
            curl -s http://localhost:8081/health || echo "Backend not responding on 8081"
            echo ""
            echo "=== Caddy health check ==="
            curl -s http://localhost:80/ || echo "Caddy not responding on 80"
            echo ""
            echo "=== .env.prod ==="
            cat /opt/claway/.env.prod | sed 's/=.*/=***/'
