name: Fix Caddy Domain

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Write new Caddyfile
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 22
          username: root
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          script: |
            set -e
            cat > /opt/caddy/Caddyfile << 'CADDYEOF'
            :80 {
              @claway host api.claway.cc
              handle @claway {
                reverse_proxy localhost:8081
                header {
                  X-Content-Type-Options "nosniff"
                  X-Frame-Options "DENY"
                  -Server
                }
              }
              handle {
                respond "Not Found" 404
              }
            }
            CADDYEOF
            echo "Caddyfile written"
            cat /opt/caddy/Caddyfile

      - name: Reload Caddy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 22
          username: root
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          script: |
            set -e
            docker restart claway-caddy
            sleep 2
            docker ps | grep caddy
            echo "Caddy reloaded"
